services:
  ants-ai-gateway:
    build: .
    ports:
      - "${ANTS_GATEWAY_PORT:-8010}:8000"
    env_file:
      - .env
    environment:
      ANTS_ENV: ${ANTS_ENV:-local}
      ANTS_DEFAULT_PROVIDER: ${ANTS_DEFAULT_PROVIDER:-openrouter}
    networks:
      - default
      - supabase

networks:
  supabase:
    external: true
    name: ${ANTS_SUPABASE_DOCKER_NETWORK:-supabase_default}
